<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Invaders Clone</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      overscroll-behavior: none;
    }

    #gameWrap {
      position: relative;
      width: 600px;
      margin: 0 auto;
      touch-action: none;
    }

    canvas {
      display: block;
      margin: 0 auto;
    }

    #hudCanvas {
      background: #111;
      border: 2px solid white;
      border-bottom: none;
      width: 600px;
      height: 50px;
    }

    #gameCanvas {
      background: black;
      border: 2px solid white;
      border-top: none;
      width: 600px;
      height: 400px;
    }

    /* Mobile scaling */
    @media (max-width: 700px) {
      #gameWrap,
      #hudCanvas,
      #gameCanvas {
        width: 100vw;
        max-width: 600px;
      }

      body {
        padding: 10px;
      }
    }

    /* Mobile-only FIRE button */
    #fireBtn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 2px solid white;
      background: rgba(255, 255, 0, 0.85);
      color: #000;
      font-size: 18px;
      font-weight: bold;
      display: none; /* enabled via JS for mobile */
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #fireBtn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <h1>Mein Space Invader Clone</h1>
  <h1>\O/ -------------------------------------------- \O/</h1>

  <div id="gameWrap">
    <canvas id="hudCanvas" width="600" height="50"></canvas>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="fireBtn" aria-label="Fire button">FIRE</div>
  </div>

  <div id="controls">
    <h2>Controls</h2>
    <p><strong>left arrow or a for left / right arrow or d for right</strong></p>
    <p><strong>Space to fire</strong></p>
    <p><strong>esc for pause</strong></p>
    <p><strong>Mobile: drag your finger on the game to move + tap FIRE</strong></p>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
